name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and package
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Match tag to package version
        id: version
        shell: pwsh
        run: |
          $metadata = Get-Content package.json -Raw | ConvertFrom-Json
          $version = [string]$metadata.version
          $tag = [string]$env:GITHUB_REF_NAME
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$') {
            throw "package.json contains an unsupported version: $version"
          }
          if ($tag -ne "v$version") {
            throw "Tag $tag does not match package.json version $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Verify lockfile policy
        shell: pwsh
        run: |
          if (Test-Path package-lock.json) {
            npm.cmd ci --ignore-scripts --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) { throw "npm ci failed" }
          } elseif ((Get-Content package.json -Raw | ConvertFrom-Json).dependencies) {
            throw "Runtime dependencies require a committed package-lock.json"
          }

      - name: Check syntax
        run: npm.cmd run check

      - name: Run tests
        run: npm.cmd test

      - name: Build archive and checksum
        id: pack
        shell: pwsh
        run: |
          $raw = npm.cmd pack --ignore-scripts --json | Out-String
          if ($LASTEXITCODE -ne 0) { throw "npm pack failed" }
          $result = $raw | ConvertFrom-Json
          if (@($result).Count -ne 1) { throw "npm pack returned an unexpected result" }
          $archive = [string]@($result)[0].filename
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) {
            throw "Archive was not created: $archive"
          }
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -LiteralPath "$archive.sha256" -Encoding ascii
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            ${{ steps.pack.outputs.archive }}
            ${{ steps.pack.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish to npm (optional)
    needs: build
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js 24 for npm Trusted Publishing
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download release archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Publish with provenance
        shell: pwsh
        run: |
          $npmVersion = [version](npm.cmd --version)
          if ($npmVersion -lt [version]"11.5.1") {
            throw "npm 11.5.1 or newer is required for Trusted Publishing; found $npmVersion"
          }
          $archives = @(Get-ChildItem -LiteralPath release-assets -Filter *.tgz -File)
          if ($archives.Count -ne 1) { throw "Expected exactly one npm archive" }
          $archive = $archives[0].FullName
          npm.cmd publish $archive --access public --provenance
          if ($LASTEXITCODE -ne 0) { throw "npm publish failed" }

  github-release:
    name: Publish GitHub Release
    needs: [build, publish-npm]
    if: ${{ always() && needs.build.result == 'success' && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') }}
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Verify archive checksum
        shell: pwsh
        run: |
          $archives = @(Get-ChildItem -LiteralPath release-assets -Filter *.tgz -File)
          if ($archives.Count -ne 1) { throw "Expected exactly one npm archive" }
          $archive = $archives[0]
          $checksumPath = "$($archive.FullName).sha256"
          if (-not (Test-Path -LiteralPath $checksumPath -PathType Leaf)) {
            throw "Checksum asset is missing"
          }
          $expected = ((Get-Content -LiteralPath $checksumPath -Raw) -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash -LiteralPath $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Release archive SHA-256 mismatch" }

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          $archives = @(Get-ChildItem -LiteralPath release-assets -Filter *.tgz -File)
          $archive = $archives[0].FullName
          $checksum = "$archive.sha256"
          $tag = [string]$env:GITHUB_REF_NAME
          $repository = [string]$env:GITHUB_REPOSITORY
          & gh release view $tag --repo $repository *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $tag $archive $checksum --clobber --repo $repository
          } else {
            & gh release create $tag $archive $checksum --repo $repository --verify-tag --generate-notes --title "Codex Quota $env:RELEASE_VERSION"
          }
          if ($LASTEXITCODE -ne 0) { throw "GitHub Release publication failed" }
